pages:
  - heading: The court wanted the cleverest cat
    body: |
      One day, the ministers at Krishnadevaraya's court began praising their cats.

      Mine is the fastest, said one. Mine is the smartest, said another.

      The king smiled and turned their bragging into a challenge. Bring me a cat, he said, that can do what no other cat does.
  - heading: One bowl of milk changed everything
    body: |
      Bowls of milk were placed before the animals.

      Every cat rushed forward, except Rama's. The moment it saw the milk, it sprang back and fled as if the bowl itself were dangerous.

      The court burst into laughter. What kind of cat fears milk?
  - heading: Rama explained the trick
    body: |
      Rama bowed and told the truth.

      Once, he said, the cat had tasted milk that was too hot. Since then, even cool milk looked suspicious.

      The king laughed, the ministers fell silent, and the strangest cat in court became the most memorable one.
