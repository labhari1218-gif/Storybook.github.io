  - heading: Come in. The book begins here.
    body: |
      Happy Ugadi, and welcome.

      This little book gathers a few bright things from Telugu memory: wit in the court of Tenali Ramakrishna, the music of the language, a deep old poem, temple hills, and one glance toward the rockets of Sriharikota.

      It is meant to be read casually, one soft page at a time. Stay for a minute. Turn when you like.
