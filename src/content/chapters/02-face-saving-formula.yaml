pages:
  - heading: A challenge came at the wrong time
    body: |
      After a quarrel, the king ordered Raman not to show his face at court.

      Then a giant wrestler arrived and challenged Vijayanagara's best men. The court grew uneasy. No one wanted to step forward and fail before the whole city.
  - heading: Raman returned, face hidden
    body: |
      The next morning, a visitor came in with a black pot over his head.

      It was Raman.

      I am obeying your order perfectly, he said. My face is nowhere to be seen. Let me defend the kingdom's honour.
  - heading: Sand finished what strength began
    body: |
      In the arena, Raman proposed a test. He would do something with closed eyes, and the wrestler must do the same with open ones.

      Raman shut his eyes. An assistant threw sand across his face.

      The wrestler imagined the sting, the blur, the shame of standing helpless before the crowd, and gave up at once.

