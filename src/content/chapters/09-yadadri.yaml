pages:
  - heading: A temple the region carries with pride
    body: |
      Yadadri, also known as Yadagirigutta, is remembered not just for scale but for atmosphere: a hill, a sacred story rooted in cave worship, and a temple form that rises with unusual brightness.

      For many visitors, the place feels both intimate and grand. The older memory of the shrine still clings to the hill even as the temple now stands with renewed visual splendour.

      That blend gives Yadadri its distinct emotional force in Telangana.
