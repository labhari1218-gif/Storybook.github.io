pages:
  - heading: Everyone trusted the expensive horses
    body: |
      An Arab trader brought fine Persian horses to Vijayanagara, and the courtiers proudly bought them.

      Rama said local horses could do just as well if they were handled wisely.

      The ministers laughed and demanded a race.
  - heading: Rama arrived with a strange idea
    body: |
      On the day of the race, sleek horses stamped and glittered in the sun.

      Rama came with a much leaner horse and carried a pole with fresh grass tied at the end, hanging just ahead of the animal's nose.

      The court stared. This did not look like training. It looked like nonsense.
  - heading: The horse kept chasing the green
    body: |
      The race began. Rama's horse surged after the grass, then ran harder as the tempting bundle stayed just beyond reach.

      It crossed the finish first.

      When the king asked what the lesson was, Rama replied that a strong desire can create its own speed.
