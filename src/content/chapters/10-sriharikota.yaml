  - heading: India's spaceport on the Andhra coast
    body: |
      Sriharikota is home to the Satish Dhawan Space Centre, the launch base that sends Indian rockets into the sky.

      There, solid propellants are processed, vehicles are assembled, systems are tested, and countdowns become flame, sound, and ascent.

      In this little book, Sriharikota stands for a different strand of Telugu-region imagination: not only memory and story, but science, precision, and the future.
