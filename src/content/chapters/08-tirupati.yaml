pages:
  - heading: A place carried by countless footsteps
    body: |
      Tirupati lives in memory as ascent, waiting, bells, vows, and the long patience of pilgrimage.

      The hill does not feel empty even in silence. It feels held by generations who came before, climbed before dawn, stood in line, and carried home the sense of having arrived somewhere older than themselves.

      That is why the name is more than a destination. It is an experience of devotion in motion.

