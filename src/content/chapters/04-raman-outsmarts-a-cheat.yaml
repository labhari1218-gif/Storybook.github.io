title: Raman Outsmarts a Cheat
subtitle: On the road to Tirupati, Raman keeps one step ahead
type: story
hook: A thief watched Raman's pillow all night and still missed the money.
takeaway: The safest hiding place is sometimes the one your enemy refuses to suspect.
