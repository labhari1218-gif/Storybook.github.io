pages:
  - heading: A fellow traveller seemed too curious
    body: |
      Raman set out for Tirupati with money tucked safely inside his pillow.

      On the way, he met a man who quickly became overfriendly, overhelpful, and very interested in Raman's belongings.

      Raman understood at once: this was no honest pilgrim.
  - heading: The search went on through the night
    body: |
      Wherever they rested, the cheat waited for Raman to sleep and then searched his bags.

      He looked in bundles, cloth rolls, food packets, and corners of the room.

      Night after night, he found nothing and grew more desperate.
  - heading: The money had stayed closest to the thief
    body: |
      At Tirupati, the man finally demanded to know where the money had been hidden.

      Raman smiled. Every night, he said, I slipped it into your pillow. You searched everywhere except the place beneath your own head.

      The cheat had carried Raman's secret for the whole journey without ever guessing it.

