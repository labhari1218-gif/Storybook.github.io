pages:
  - heading: Uppu kappurambu
    body: |
      Salt and camphor may seem alike at a glance, yet taste and fragrance reveal their difference at once.

      Vemana turns that simple contrast into a human lesson: outward similarity means very little. Character discloses itself only in experience.
    displayLines:
      - Uppu kappurambu nokka polikanundu
      - Chooda chooda ruchula jaada veru
      - Purushulandu punyapurushulu verayaa
      - Vishwadabhirama vinura Vema
    translationLines:
      - Salt and camphor may look as if they are one,
      - but on the tongue and in the air they part ways.
      - "So it is among people:"
      - the truly good reveal themselves in the living.
