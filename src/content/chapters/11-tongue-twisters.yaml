pages:
  - heading: Tap a line. Then say it faster.
    body: |
      Start slowly. Keep the sounds clear. Then try again before your tongue can relax.

      These are shown in Romanized Telugu so anyone can join in quickly on a phone screen.
extras:
  - label: Rendu yerra laarilu nalugu nalla laarilu
    value: Two red lorries, four black lorries. The r and l sounds start tangling almost immediately.
  - label: Yerra lorry tella lorry
    value: Red lorry, white lorry. Short, simple, and dangerous at speed.
  - label: Kekeeka Kekiki Kaaka Kaakiki vuntudaa?
    value: A teasing chain of tiny sound shifts. One wrong vowel and the whole line wobbles.
  - label: Bujjigadu bajjilu tini Bujjiga bajjonnadu
    value: Bujji ate bajjis and became bajji-like himself. Say it three times and try not to smile.
