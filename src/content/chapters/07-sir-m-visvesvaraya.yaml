  - heading: Engineer first, legend second
    body: |
      Sir M. Visvesvaraya was one of India's most respected engineers and later served as Diwan of Mysore from 1912 to 1918.

      He is remembered for disciplined public work: major irrigation and engineering projects, planning influence in Mysore, and flood-control work connected with Hyderabad.

      The lasting inspiration is not one dramatic anecdote, but a career built on precision, duty, and the belief that infrastructure can widen a society's future.

